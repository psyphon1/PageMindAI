<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageMindAI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --bg2: #18181f;
      --bg3: #22222c;
      --border: rgba(255,255,255,0.09);
      --text: #e8e8f0;
      --muted: #888;
      --yt: #ff4e4e;
      --yt-bg: rgba(255,78,78,0.12);
      --web: #4eaaff;
      --web-bg: rgba(78,170,255,0.12);
      --accent: #7c6ff7;
      --accent-hover: #9589ff;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body {
      width: 360px;
      min-height: 520px;
      max-height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 12px 14px 10px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .logo-icon {
      width: 20px; height: 20px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
    }
    .settings-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; line-height: 1;
      padding: 2px 4px; border-radius: 4px;
    }
    .settings-btn:hover { color: var(--text); background: var(--bg3); }

    /* ── Page badge ── */
    .page-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 9px; border-radius: 7px;
      font-size: 11px; font-weight: 500; width: fit-content;
    }
    .badge-yt  { background: var(--yt-bg);  color: var(--yt);  }
    .badge-web { background: var(--web-bg); color: var(--web); }
    .badge-loading { background: var(--bg3); color: var(--muted); }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .dot-yt  { background: var(--yt); }
    .dot-web { background: var(--web); }
    .dot-loading { background: var(--muted); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Page info ── */
    .page-info {
      padding: 7px 14px 8px;
      border-bottom: 0.5px solid var(--border);
    }
    .page-title {
      font-size: 11px; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-weight: 500; margin-bottom: 2px;
    }
    .page-url {
      font-size: 10px; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Status bar ── */
    .status-bar {
      padding: 7px 14px;
      border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 7px;
      font-size: 11px;
    }
    .status-bar.hidden { display: none; }
    .spinner {
      width: 12px; height: 12px;
      border: 1.5px solid var(--bg3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text { color: var(--muted); }
    .status-ok   { color: #4ade80; }
    .status-err  { color: var(--yt); }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 240px;
      scrollbar-width: thin;
      scrollbar-color: var(--bg3) transparent;
    }

    .msg {
      max-width: 88%;
      padding: 8px 11px;
      border-radius: 11px;
      font-size: 12px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg-bot {
      background: var(--bg2);
      color: #ccc;
      align-self: flex-start;
      border-radius: 4px 11px 11px 11px;
      border: 0.5px solid var(--border);
    }
    .msg-user {
      background: rgba(124,111,247,0.28);
      color: #e0dfff;
      align-self: flex-end;
      border-radius: 11px 4px 11px 11px;
    }
    .typing-indicator {
      display: flex; gap: 4px; align-items: center; padding: 2px 0;
    }
    .typing-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted); animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.25} 40%{opacity:1} }

    /* ── Suggestions ── */
    .suggestions {
      padding: 6px 12px 4px;
      display: flex; gap: 5px; flex-wrap: wrap;
    }
    .sugg-btn {
      padding: 4px 9px; border-radius: 6px;
      background: var(--bg3); color: var(--muted);
      font-size: 11px; border: 0.5px solid var(--border);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
      font-family: var(--font);
    }
    .sugg-btn:hover { background: var(--bg2); color: var(--text); }
    .sugg-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Input ── */
    .input-row {
      padding: 8px 10px 10px;
      border-top: 0.5px solid var(--border);
      display: flex; gap: 6px; align-items: flex-end;
    }
    .chat-input {
      flex: 1; background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 9px; padding: 8px 11px;
      font-size: 12px; color: var(--text);
      outline: none; resize: none;
      font-family: var(--font); line-height: 1.4;
      min-height: 36px; max-height: 80px;
      transition: border-color 0.15s;
    }
    .chat-input::placeholder { color: #3a3a4a; }
    .chat-input:focus { border-color: rgba(124,111,247,0.4); }
    .chat-input:disabled { opacity: 0.5; }

    .send-btn {
      width: 34px; height: 34px; min-width: 34px;
      border-radius: 9px;
      background: var(--accent); border: none;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      color: #fff; font-size: 15px;
      transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .send-btn:active:not(:disabled) { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Settings panel ── */
    .settings-panel {
      display: none;
      padding: 12px 14px;
      border-top: 0.5px solid var(--border);
      flex-direction: column; gap: 10px;
    }
    .settings-panel.open { display: flex; }
    .settings-row {
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .settings-label { font-size: 11px; color: var(--muted); }
    .settings-input {
      background: var(--bg2); border: 0.5px solid var(--border);
      border-radius: 6px; padding: 5px 8px;
      font-size: 11px; color: var(--text);
      outline: none; width: 200px; font-family: var(--font);
    }
    .settings-input:focus { border-color: rgba(124,111,247,0.4); }
    .save-btn {
      width: 100%; padding: 7px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 7px;
      font-size: 12px; cursor: pointer;
      font-family: var(--font); font-weight: 500;
      transition: background 0.15s;
    }
    .save-btn:hover { background: var(--accent-hover); }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: var(--muted); font-size: 12px; padding: 20px;
      text-align: center;
    }
    .empty-icon { font-size: 28px; opacity: 0.5; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">✦</div>
        PageMindAI
      </div>
      <button class="settings-btn" id="settingsToggle" title="Settings">⚙</button>
    </div>
    <div id="pageBadge" class="page-badge badge-loading">
      <span class="badge-dot dot-loading" id="badgeDot"></span>
      <span id="badgeText">Analyzing page…</span>
    </div>
  </div>

  <!-- Page info -->
  <div class="page-info">
    <div class="page-title" id="pageTitle">—</div>
    <div class="page-url"   id="pageUrl">—</div>
  </div>

  <!-- Status -->
  <div class="status-bar hidden" id="statusBar">
    <div class="spinner" id="statusSpinner"></div>
    <span class="status-text" id="statusText">Indexing content…</span>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔍</div>
      <div>Loading page info…</div>
    </div>
  </div>

  <!-- Suggestions -->
  <div class="suggestions" id="suggestions"></div>

  <!-- Input -->
  <div class="input-row">
    <textarea
      class="chat-input"
      id="chatInput"
      placeholder="Ask anything about this page…"
      rows="1"
      disabled
    ></textarea>
    <button class="send-btn" id="sendBtn" disabled>↑</button>
  </div>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-row">
      <span class="settings-label">Backend URL</span>
      <input class="settings-input" id="backendUrl" type="text" placeholder="http://localhost:8000" />
    </div>
    <button class="save-btn" id="saveSettings">Save</button>
    <div style="font-size: 10px; color: var(--muted); text-align: center; margin-top: 10px;">
      Developed by <b>Chinmay Duse (psyphon1)</b><br/>
      Team: <b>firefox technologies</b>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
